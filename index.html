<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Masomo Testimony</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a3a5f 0%, #2c3e50 100%);
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .login-card h2 {
            color: #1a3a5f;
            margin-bottom: 10px;
        }
        .login-card p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #d4af37;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }
        .login-btn:hover {
            background-color: #b8860b;
        }
        #message {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #c0392b;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Masomo Testimony</h2>
    <p>Please enter your credentials to continue reading.</p>
    
    <form id="loginForm">
        <input type="number" id="nationalId" placeholder="National ID" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="login-btn" id="submitBtn">UNLOCK BOOK</button>
    </form>
    
    <div id="message"></div>
</div>

<script>
    // Replace this with your actual Google Apps Script Web App URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz91zjIKHj6GwGoOYGQ5MpLFLY6_4wocXTQLByRlTBsNgLnMmS1jiJzB8HsnBVCWUlCvw/exec";

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('message');
        const nationalId = document.getElementById('nationalId').value;
        const password = document.getElementById('password').value;

        btn.disabled = true;
        btn.innerText = "Verifying...";
        msg.innerText = "";

        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ nationalId, password })
            });
            
            const result = await response.json();

            if (result.success) {
                // Store session info
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userName', result.name);
                
                // Redirect to Part 1
                window.location.href = "part1.html";
            } else {
                msg.innerText = "Invalid ID or Password. Please try again.";
                btn.disabled = false;
                btn.innerText = "UNLOCK BOOK";
            }
        } catch (error) {
            msg.innerText = "Connection error. Check your internet.";
            btn.disabled = false;
            btn.innerText = "UNLOCK BOOK";
        }
    });
</script>

</body>
</html>
